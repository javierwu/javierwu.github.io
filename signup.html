            <h1 class="page-title">报名状态</h1>

            <!-- 统计图表 -->
            <div class="stats-section">
                <div class="chart-container">

                        <circle cx="100" cy="100" r="80" fill="none" stroke="#EEEEEE" stroke-width="30"/>
                        <circle cx="100" cy="100" r="80" fill="none" stroke="#87A96B" stroke-width="30"

                    <div class="chart-center">
                        <span class="chart-label">报名率</span>
                        <span class="chart-value">84.9%</span>
                    </div>
                </div>
                <div class="stats-info">
                    <div class="stat-item confirmed">
                        <span class="stat-value">45</span>
                        <span class="stat-label">确定参加</span>
                    </div>
                    <div class="stat-item tentative">
                        <span class="stat-value">3</span>
                        <span class="stat-label">待定</span>
                    </div>
                    <div class="stat-item pending">
                        <span class="stat-value">5</span>
                        <span class="stat-label">未回复</span>
                    </div>
                    <div class="stat-item total">
                        <span class="stat-value">53</span>
                        <span class="stat-label">总人数</span>
                    </div>
                </div>
            </div>

            <!-- 图例说明 -->
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color confirmed"></div>
                    <span>确定参加</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color tentative"></div>
                    <span>待定</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color pending"></div>
                    <span>未回复</span>
                </div>
            </div>

            <!-- 学号网格 -->
            <div class="id-section">
                <h2 class="section-heading">学号一览</h2>
                <div class="id-grid" id="idGrid"></div>
            </div>
        </div>
    </section>
